<html lang="pt-br">
<head>

<script>

window.pintrk = function () {

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  background:#E74B2E;
  display:flex;
  justify-content:center;
  align-items:center;
}
.botao{
  background:#fff;
  color:#E74B2E;
  padding:20px 60px;
  font-size:26px;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}
</style>

</head>

<body>

<div id="btnShopee" class="botao">Abrir a Shopee</div>

<script>
(function(){

// ================= TRACK GLOBAL =================
function track(e,d={}) {
  fbq('trackCustom', e, d);

  if (typeof pintrk !== "undefined") {
    pintrk('track', e, d);
  }
}

// ================= PARAMETROS =================
const params=new URLSearchParams(window.location.search)

let LINK=null,UC=null

const raw=params.get("dest")

if(raw && raw.includes("|||")){
  const p=raw.split("|||")
  LINK=p[0]
  UC=p[1]
}else{
  LINK=params.get("dest")
  UC=params.get("uc")
}

if(!LINK||!UC){
  alert("Erro parâmetros")
  throw new Error()
}

// ================= TEMPO =================
let tempo=0,tempoLabel="S0"

let tempoS0a1=false;
let tempoS1a2=false;

let evento01=false;
let evento02=false;

let clickRight=false;

function checkEventos(){

  if(clickRight && tempoS0a1 && !evento02){
    track('EVENTO02');
    evento02=true;
  }

  if(clickRight && tempoS1a2 && !evento01){
    track('EVENTO01');
    evento01=true;
  }

}

const tempoInterval=setInterval(()=>{
  tempo++

  if(tempo<=30){
    tempoLabel="S"+(tempo-1)+"a"+tempo
    track("Tempo_"+tempoLabel)
  }else{
    clearInterval(tempoInterval)
  }

  if(tempoLabel==="S0a1"){
    tempoS0a1=true;
    checkEventos();
  }

  if(tempoLabel==="S1a2"){
    tempoS1a2=true;
    checkEventos();
  }

},1000)

// ================= CLASSIFICAR =================
function classificar(mbps){
  if(mbps <= 0.5) return 1
  if(mbps <= 0.8) return 2
  if(mbps <= 1) return 3
  if(mbps <= 2) return 4
  if(mbps <= 4) return 5
  if(mbps <= 6) return 6
  if(mbps <= 10) return 7
  if(mbps <= 15) return 8
  if(mbps <= 20) return 9
  if(mbps <= 30) return 11
  if(mbps <= 40) return 12
  if(mbps <= 50) return 13
  if(mbps <= 60) return 14
  return 15
}

// ================= VELOCIDADE =================
let velocidade=null

async function medirVelocidade(){
  try{
    const controller=new AbortController()
    setTimeout(()=>controller.abort(),1000)

    let totalBytes=0
    const start=performance.now()

    const res=await fetch("https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js",{
      signal:controller.signal,
      cache:"no-store"
    })

    const reader=res.body.getReader()

    while(true){
      const {done,value}=await reader.read()
      if(done)break
      totalBytes+=value.length
    }

    const duration=(performance.now()-start)/1000

    if(totalBytes>0){
      velocidade=(totalBytes*8/duration)/(1024*1024)

      const nivel=classificar(velocidade)

      track("Velocidade_N"+nivel)
      track("VelocidadeInternet",{mbps:velocidade.toFixed(2),nivel})
    }

  }catch(e){
    track("Velocidade_Erro")
  }
}

medirVelocidade()

// ================= CLIQUE =================
document.getElementById("btnShopee").addEventListener("click",function(e){

  const btn=this
  btn.innerText="Redirecionando..."

  const rect=btn.getBoundingClientRect()
  const x=e.clientX - rect.left
  const largura=rect.width

  let pos

  const inicioCentro=largura*0.45
  const fimCentro=largura*0.55

  if(x < inicioCentro){
    pos="Left"
  }else if(x > fimCentro){
    pos="Right"
  }else{
    pos="Center"
  }

  // EVENTOS PIXEL
  track('ClickShopee',{position:pos})

  if(pos==="Left"){
    track('ClickShopee_Left')
  }else if(pos==="Center"){
    track('ClickShopee_Center')
  }else{
    track('ClickShopee_Right')
    clickRight = true;
    checkEventos();
  }

  // EVENTOS DE CONVERSÃO
  fbq('track', 'InitiateCheckout');

  if (typeof pintrk !== "undefined") {
    pintrk('track', 'checkout');
  }

  const tempoClick=tempoLabel

  let tag
  if(velocidade){
    tag="N"+classificar(velocidade)
  }else{
    tag="N5"
  }

  const lado = pos === "Left" ? "L" : pos === "Right" ? "R" : "C"

  const baseUC = UC.replace(/[^a-zA-Z0-9]/g,"")

  const finalUC = (
    baseUC +
    "ClickShopee" + pos +
    "i" +
    tempoClick +
    tag +
    lado
  ).replace(/[^a-zA-Z0-9]/g,"")

  const url=`https://shopee-utm-tracker.onrender.com/?link=${encodeURIComponent(LINK)}&uc=${finalUC}`

  window.location.href=url

})

})();
</script>

</body>
</html>
